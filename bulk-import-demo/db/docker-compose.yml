services:
  postgres:
    image: postgres:16
    container_name: bulk-import-postgres
    environment:
      POSTGRES_DB: bulk_import_demo
      POSTGRES_PASSWORD: demopassword
    ports:
      # Host port 5434, not 5432 - a native Windows Postgres service was
      # already bound to 5432, silently intercepting connections meant for
      # this container.
      - "5434:5432"
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql

  pgadmin:
    image: dpage/pgadmin4
    container_name: bulk-import-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: demopassword
    ports:
      - "5050:80"
    depends_on:
      - postgres
